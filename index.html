<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalMighty | Local AI Visibility & GEO Audits</title>
    <meta
      name="description"
      content="Is your business invisible to AI search? LocalMighty audits small businesses for AI-readability, ChatGPT visibility, and Google AI Overviews."
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "LocalMighty",
        "image": "https://localmighty.netlify.app/logo.png",
        "@id": "https://localmighty.netlify.app",
        "url": "https://localmighty.netlify.app",
        "telephone": "",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Remote",
          "addressLocality": "Global",
          "postalCode": "00000",
          "addressCountry": "US"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 0,
          "longitude": 0
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "09:00",
          "closes": "18:00"
        },
        "sameAs": []
      }
    </script>

    <!-- favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
